<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment complete — ListLift</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site"><div class="wrap row"><div class="brand">📈 ListLift</div></div></header>
  <main class="wrap">
    <section class="card" style="text-align:center; margin-top:40px;">
      <h1 id="headline">Confirming your payment…</h1>
      <p id="msg" class="muted">One moment while we unlock your listings.</p>
      <a class="btn primary" id="back" href="/" style="display:none; max-width:300px; margin:18px auto 0;">Start optimizing →</a>
    </section>
  </main>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const sessionId = params.get('session_id');
      const uid = localStorage.getItem('listlift_uid');
      const headline = document.getElementById('headline');
      const msg = document.getElementById('msg');
      const back = document.getElementById('back');
      if (!sessionId || !uid) {
        headline.textContent = 'Hmm, missing session info';
        msg.textContent = 'We could not confirm this purchase automatically. If you were charged, contact support with your receipt.';
        back.style.display = 'inline-block';
        return;
      }
      try {
        const res = await fetch('/api/fulfill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-listlift-uid': uid },
          body: JSON.stringify({ uid, sessionId }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          headline.textContent = '🎉 You\'re unlocked!';
          msg.textContent = `${data.balance.paidCredits} listings are ready to generate. Thanks for supporting ListLift!`;
        } else if (res.status === 402) {
          headline.textContent = 'Payment not confirmed yet';
          msg.textContent = 'If you just paid, refresh in a moment. If you were charged and this persists, contact support.';
        } else {
          headline.textContent = 'Something went wrong';
          msg.textContent = data.message || 'We could not unlock automatically — contact support with your receipt.';
        }
      } catch {
        headline.textContent = 'Network hiccup';
        msg.textContent = 'Could not reach the server. Refresh to retry.';
      }
      back.style.display = 'inline-block';
    })();
  </script>
</body>
</html>
